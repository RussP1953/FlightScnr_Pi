name: 🚀 Feature request
description: Suggest an improvement or new option
title: "[Feature]: "
labels: ["feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Describe the problem or clutter you're trying to solve, and what you'd like added.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is missing or awkward today, and why it matters.
      placeholder: |
        The radar already has a "Show compass rose" toggle, but there is no equivalent for…
    validations:
      required: true

  - type: textarea
    id: request
    attributes:
      label: Request
      description: Concrete behavior or UI you want (settings, portal checkbox, on-device control, etc.).
      placeholder: |
        Add a `show_range_rings` setting (mirroring `show_compass_rose`) with a matching checkbox in the web portal…
    validations:
      required: true

  - type: textarea
    id: touchpoints
    attributes:
      label: Where this would touch (optional)
      description: If you've browsed the code, list files or patterns that look relevant.
      placeholder: |
        - settings.py — add key + getter/setter, same pattern as …
        - screens/radar.py — wrap drawing in if …
        - web/templates/index.html — checkbox + JS wiring
      render: markdown

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
      description: Workarounds or other approaches you thought about.
